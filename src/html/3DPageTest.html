<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-box position="0 0 0" rotation="0 0 0" color="#4CC3D9"></a-box>
      <a-cylinder position="1 1 1" rotation="0 0 1" radius="1" color="#4CC3D9"></a-cylinder>
      <a-sphere position="0 1.25 -5" rotation="0 0 0"radius="1.25" color="#EF2D5E"></a-cylinder>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <a-sky color="#EC8CEC"></a-sky>
    </a-scene>
  </body>
</html>
